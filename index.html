<body>
  <div id="root"></div>

  <script type="text/babel">
    /* =====================================================================
       ABC Score — SDD v0.2
       Scoring: §5 formula + §5.2 missing-pillar renormalization
       UI: full-width table · right slide-over drill-down · left settings drawer
           · centered intake modal with live preview
       §9.1 GUARDRAIL: simulated API connect clearly labeled
       No network · no storage · no ML · all in-memory synthetic data
       Hand-verified: OFF-0001 → composite ≈ 97.4
       ===================================================================== */

    const SIGNAL_DEFS = [
      { key: "asset_income_ratio",        pillar: "A", weightInPillar: 0.30, labelTh: "อัตราส่วนทรัพย์สินต่อรายได้",            labelEn: "Asset-to-income ratio",      unit: "เท่า",   fmt: v => v.toFixed(1),  descTh: "ทรัพย์สินสูงผิดปกติเมื่อเทียบกับรายได้ตลอดอายุราชการ" },
      { key: "networth_jump",             pillar: "A", weightInPillar: 0.25, labelTh: "การเพิ่มของทรัพย์สินสุทธิที่ไม่อธิบาย",  labelEn: "Unexplained net-worth jump", unit: "%",     fmt: v => Math.round(v), descTh: "ทรัพย์สินสุทธิเพิ่มก้าวกระโดดโดยไม่มีรายได้รองรับ" },
      { key: "concealable_share",         pillar: "A", weightInPillar: 0.20, labelTh: "สัดส่วนทรัพย์สินที่ปกปิดได้",            labelEn: "Concealable-asset share",    unit: "%",     fmt: v => Math.round(v), descTh: "ถือเงินสด/ทอง/ทรัพย์สินต่างประเทศที่ตรวจสอบยากในสัดส่วนสูง" },
      { key: "declaration_inconsistency", pillar: "A", weightInPillar: 0.15, labelTh: "ความไม่สอดคล้องของการยื่นบัญชี",        labelEn: "Declaration inconsistency",  unit: "รายการ", fmt: v => Math.round(v), descTh: "ยื่นไม่ครบ ข้อมูลไม่ตรงกัน หรือยื่นล่าช้า" },
      { key: "position_opportunity",      pillar: "A", weightInPillar: 0.10, labelTh: "โอกาสจากตำแหน่งหน้าที่",               labelEn: "Position opportunity",       unit: "ดัชนี", fmt: v => Math.round(v), descTh: "ตำแหน่งมีอำนาจเหนืองบประมาณ การจัดซื้อ หรือการอนุมัติ" },
      { key: "cash_structuring",          pillar: "B", weightInPillar: 0.35, labelTh: "การแยกธุรกรรมเลี่ยงการรายงาน",          labelEn: "Cash structuring",           unit: "ครั้ง",  fmt: v => Math.round(v), descTh: "แยกย่อยธุรกรรมให้ต่ำกว่าเกณฑ์รายงานเพื่อเลี่ยงการตรวจ" },
      { key: "txn_velocity",              pillar: "B", weightInPillar: 0.30, labelTh: "ความถี่/ปริมาณธุรกรรมเทียบรายได้",       labelEn: "Transaction velocity",       unit: "เท่า",   fmt: v => v.toFixed(1),  descTh: "เงินหมุนเวียนเข้า-ออกบ่อยหรือมากเกินกว่ารายได้" },
      { key: "debt_stress",               pillar: "B", weightInPillar: 0.20, labelTh: "ภาระหนี้/แรงกดดันทางการเงิน",           labelEn: "Debt stress (DTI)",          unit: "%",     fmt: v => Math.round(v), descTh: "ภาระหนี้สูงจนเป็นแรงกดดันให้แสวงหารายได้นอกระบบ" },
      { key: "lifestyle_mismatch",        pillar: "B", weightInPillar: 0.15, labelTh: "วิถีชีวิตไม่สอดคล้องกับรายได้",          labelEn: "Lifestyle mismatch",         unit: "ดัชนี", fmt: v => Math.round(v), descTh: "การใช้จ่าย/ทรัพย์สินสูงเกินกว่ารายได้ที่แจ้ง" },
      { key: "bidder_link",               pillar: "C", weightInPillar: 0.40, labelTh: "ความเชื่อมโยงกับผู้เสนอราคา",            labelEn: "Link to bidders",            unit: "ราย",   fmt: v => Math.round(v), descTh: "เชื่อมโยงกับบริษัทที่เสนอราคางานที่ตนกำกับดูแล" },
      { key: "nominee_holdings",          pillar: "C", weightInPillar: 0.25, labelTh: "การถือครองโดยตัวแทน/เครือญาติ",         labelEn: "Nominee holdings",           unit: "ราย",   fmt: v => Math.round(v), descTh: "ถือครองทรัพย์สิน/หุ้นผ่านตัวแทนหรือเครือญาติเพื่อปิดบัง" },
      { key: "codirectorship",            pillar: "C", weightInPillar: 0.20, labelTh: "การเป็นกรรมการร่วม/ที่อยู่ร่วม",         labelEn: "Co-directorship",            unit: "ราย",   fmt: v => Math.round(v), descTh: "เป็นกรรมการร่วมหรือใช้ที่อยู่เดียวกับผู้เกี่ยวข้อง" },
      { key: "coi_proximity",             pillar: "C", weightInPillar: 0.15, labelTh: "ความใกล้ชิดผลประโยชน์ทับซ้อน",          labelEn: "COI proximity",              unit: "ดัชนี", fmt: v => Math.round(v), descTh: "ใกล้ชิดผู้มีส่วนได้เสียจนเสี่ยงผลประโยชน์ทับซ้อน" },
    ];

    const PILLARS = ["A", "B", "C"];
    const PILLAR_META = {
      A: { nameTh: "การยื่นบัญชี",  nameEn: "Application", triangleTh: "โอกาส (Opportunity)",           source: "ACAS (ป.ป.ช.)",              descTh: "การยื่นบัญชีทรัพย์สินดูผิดปกติหรือไม่" },
      B: { nameTh: "พฤติกรรม",      nameEn: "Behavioral",  triangleTh: "แรงกดดัน (Pressure)",           source: "AMLO/ธนาคาร — ข้อมูลจำลอง", descTh: "พฤติกรรมการเงินบ่งชี้แรงกดดัน/ความผิดปกติหรือไม่" },
      C: { nameTh: "ความเชื่อมโยง", nameEn: "Connection",  triangleTh: "การหาเหตุผล (Rationalization)", source: "e-GP/ทะเบียน — ข้อมูลจำลอง",  descTh: "ความสัมพันธ์สร้างผลประโยชน์ทับซ้อนหรือไม่" },
    };

    const RAW_SCALE = {
      asset_income_ratio:        { base: 0.8, range: 6.0 },
      networth_jump:             { base: 2,   range: 55  },
      concealable_share:         { base: 5,   range: 70  },
      declaration_inconsistency: { base: 0,   range: 7   },
      position_opportunity:      { base: 10,  range: 85  },
      cash_structuring:          { base: 0,   range: 22  },
      txn_velocity:              { base: 0.5, range: 8   },
      debt_stress:               { base: 10,  range: 180 },
      lifestyle_mismatch:        { base: 5,   range: 90  },
      bidder_link:               { base: 0,   range: 9   },
      nominee_holdings:          { base: 0,   range: 6   },
      codirectorship:            { base: 0,   range: 8   },
      coi_proximity:             { base: 5,   range: 90  },
    };

    const PROFILES = [
      { tA: 0.95, tB: 0.90, tC: 0.85 },
      { tA: 0.85, tB: 0.80, tC: 0.60 },
      { tA: 0.70, tB: 0.86, tC: 0.78 },
      { tA: 0.74, tB: 0.55, tC: 0.50 },
      { tA: 0.50, tB: 0.72, tC: 0.55 },
      { tA: 0.60, tB: 0.45, tC: 0.66 },
      { tA: 0.40, tB: 0.60, tC: 0.56 },
      { tA: 0.55, tB: 0.50, tC: 0.40 },
      { tA: 0.48, tB: 0.46, tC: 0.36 },
      { tA: 0.35, tB: 0.56, tC: 0.46 },
      { tA: 0.42, tB: 0.35, tC: 0.30 },
      { tA: 0.30, tB: 0.40, tC: 0.36 },
      { tA: 0.36, tB: 0.28, tC: 0.25 },
      { tA: 0.25, tB: 0.31, tC: 0.30 },
      { tA: 0.28, tB: 0.22, tC: 0.20 },
      { tA: 0.18, tB: 0.26, tC: 0.22 },
      { tA: 0.12, tB: 0.15, tC: 0.10 },
      { tA: 0.04, tB: 0.07, tC: 0.05 },
    ];

    const CONSONANTS = ["ก","ข","ค","ฆ","ง","จ","ฉ","ช","ซ","ฌ","ญ","ฎ","ฏ","ฐ","ฑ","ฒ","ณ","ด"];
    const SURNAMES   = ["ทดสอบ","ตัวอย่าง","จำลอง","สาธิต"];
    const TITLES     = ["นาย","นางสาว","นาง"];
    const POSITIONS  = [
      "ผู้อำนวยการกอง (จำลอง)",
      "นักวิเคราะห์นโยบายและแผน (จำลอง)",
      "หัวหน้าฝ่ายพัสดุ (จำลอง)",
      "ผู้บริหารองค์กรปกครองส่วนท้องถิ่น (จำลอง)",
      "นายช่างโยธา (จำลอง)",
      "เจ้าพนักงานจัดเก็บรายได้ (จำลอง)",
      "ผู้อำนวยการสำนัก (จำลอง)",
      "หัวหน้าส่วนราชการ (จำลอง)",
    ];
    const COHORTS = ["ระดับสูง (จำลอง)", "ระดับกลาง (จำลอง)", "ระดับต้น (จำลอง)"];

    function signalTargets(pillar, target, idx) {
      const defs = SIGNAL_DEFS.filter(s => s.pillar === pillar);
      const amp = 0.13;
      const offs = defs.map((s, j) => amp * Math.sin(idx * 0.7 + j * 1.7 + pillar.charCodeAt(0) * 0.31));
      const wmean = defs.reduce((a, s, j) => a + s.weightInPillar * offs[j], 0);
      const out = {};
      defs.forEach((s, j) => { out[s.key] = Math.min(0.99, Math.max(0.015, target + (offs[j] - wmean))); });
      return out;
    }

    function generateData() {
      const officials = [], rawMatrix = {};
      PROFILES.forEach((prof, i) => {
        const id = "OFF-" + String(i + 1).padStart(4, "0");
        officials.push({
          id,
          nameTh: `${TITLES[i % TITLES.length]} ${CONSONANTS[i]}. ${SURNAMES[i % SURNAMES.length]}`,
          positionTh: POSITIONS[i % POSITIONS.length],
          grade: ((i * 7) % 11) + 1,
          cohort: COHORTS[i % COHORTS.length],
        });
        const targets = { A: signalTargets("A", prof.tA, i), B: signalTargets("B", prof.tB, i), C: signalTargets("C", prof.tC, i) };
        const row = {};
        SIGNAL_DEFS.forEach(s => {
          const sc = RAW_SCALE[s.key];
          row[s.key] = sc.base + targets[s.pillar][s.key] * sc.range;
        });
        rawMatrix[id] = row;
      });
      return { officials, rawMatrix };
    }

    function normalizeMatrix(officials, rawMatrix) {
      const minK = {}, maxK = {};
      SIGNAL_DEFS.forEach(s => {
        let mn = Infinity, mx = -Infinity;
        officials.forEach(o => {
          const v = rawMatrix[o.id]?.[s.key];
          if (v == null || isNaN(v)) return;
          if (v < mn) mn = v; if (v > mx) mx = v;
        });
        minK[s.key] = mn; maxK[s.key] = mx;
      });
      const norm = {};
      officials.forEach(o => {
        const row = {};
        SIGNAL_DEFS.forEach(s => {
          const v = rawMatrix[o.id]?.[s.key];
          if (v == null || isNaN(v)) { row[s.key] = null; return; }
          const span = maxK[s.key] - minK[s.key];
          row[s.key] = Math.min(1, Math.max(0, span > 0 ? (v - minK[s.key]) / span : 0));
        });
        norm[o.id] = row;
      });
      return norm;
    }

    /* §5 SCORING — pure function. §5.2 missing-pillar renormalization.
       Hand-verified: OFF-0001 → composite ≈ 97.4, tier RED. */
    function scoreOfficial(official, normRow, rawRow, weights, signalWeights) {
      const sw = signalWeights || {};
      const wmap = { A: weights.wA, B: weights.wB, C: weights.wC };
      const pillars = {}, availability = {};
      PILLARS.forEach(p => {
        const sigDefs = SIGNAL_DEFS.filter(s => s.pillar === p);
        const available = sigDefs.every(s => normRow[s.key] != null);
        availability[p] = available;
        const signals = sigDefs.map(s => ({
          key: s.key, labelTh: s.labelTh, labelEn: s.labelEn, descTh: s.descTh,
          raw: rawRow?.[s.key], normalized: normRow[s.key],
          pillar: p, weightInPillar: sw[s.key] != null ? sw[s.key] : s.weightInPillar,
          unit: s.unit, fmt: s.fmt,
        }));
        const sub = available ? Math.min(1, signals.reduce((a, s) => a + s.normalized * s.weightInPillar, 0)) : null;
        pillars[p] = { pillar: p, subScore: sub, signals, available };
      });
      const availPillars = PILLARS.filter(p => availability[p]);
      const wsum = availPillars.reduce((a, p) => a + wmap[p], 0) || 1;
      const effW = {};
      PILLARS.forEach(p => { effW[p] = availability[p] ? wmap[p] / wsum : 0; });
      const composite = 100 * availPillars.reduce((a, p) => a + effW[p] * pillars[p].subScore, 0);
      const tier = composite >= 70 ? "RED" : composite >= 40 ? "AMBER" : "GREEN";
      const partial = availPillars.length < PILLARS.length;
      const pendingPillars = PILLARS.filter(p => !availability[p]);
      const contribs = [];
      availPillars.forEach(p => {
        pillars[p].signals.forEach(s => {
          contribs.push({ key: s.key, pillar: p, labelTh: s.labelTh, labelEn: s.labelEn,
            normalized: s.normalized, contribution: s.normalized * s.weightInPillar * effW[p] * 100 });
        });
      });
      contribs.sort((a, b) => b.contribution - a.contribution);
      return { official, pillars, composite, tier, reasonCodes: contribs.slice(0, 3), partial, pendingPillars, effW };
    }

    function computeQueue(officials, rawMatrix, normMatrix, weights, threshold, signalWeights) {
      const results = officials.map(o => scoreOfficial(o, normMatrix[o.id] || {}, rawMatrix[o.id] || {}, weights, signalWeights));
      results.forEach(r => { r.escalate = r.composite >= threshold; });
      results.sort((a, b) => b.composite - a.composite);
      results.forEach((r, i) => { r.rank = i + 1; });
      return results;
    }

    /* §9.1 GUARDRAIL — SIMULATED API (no network, no real integration) */
    function simulateApiFetch(pillar, rawARow) {
      const aDefs = SIGNAL_DEFS.filter(s => s.pillar === "A");
      let aFrac = aDefs.reduce((acc, s) => {
        const sc = RAW_SCALE[s.key];
        return acc + ((rawARow[s.key] - sc.base) / sc.range);
      }, 0) / aDefs.length;
      aFrac = Math.min(1, Math.max(0, aFrac));
      const row = {};
      SIGNAL_DEFS.filter(s => s.pillar === pillar).forEach((s, j) => {
        const sc = RAW_SCALE[s.key];
        const jitter = 0.22 * Math.sin(j * 1.9 + pillar.charCodeAt(0) * 0.37 + aFrac * 3.1);
        const f = Math.min(0.98, Math.max(0.04, aFrac + jitter));
        row[s.key] = sc.base + f * sc.range;
      });
      return row;
    }

    function fractionOf(key, raw) {
      const sc = RAW_SCALE[key];
      if (sc == null) return 0;
      return Math.min(1, Math.max(0, (raw - sc.base) / sc.range));
    }

    /* =====================================================================
       UI — institutional Thai-primary
       ===================================================================== */
    const { useState, useMemo, useCallback } = React;

    const TIER = {
      RED:   { th: "แดง",    en: "Red",   text: "text-tier-red",   bg: "bg-tier-red",   soft: "bg-red-50",     ring: "ring-tier-red/30",   dot: "bg-tier-red" },
      AMBER: { th: "เหลือง", en: "Amber", text: "text-tier-amber", bg: "bg-tier-amber", soft: "bg-amber-50",   ring: "ring-tier-amber/30", dot: "bg-tier-amber" },
      GREEN: { th: "เขียว",  en: "Green", text: "text-tier-green", bg: "bg-tier-green", soft: "bg-emerald-50", ring: "ring-tier-green/30", dot: "bg-tier-green" },
    };
    const PILLAR_COLOR = { A: "bg-slate-700", B: "bg-slate-500", C: "bg-slate-400" };
    const DEFAULTS = { wA: 0.40, wB: 0.35, wC: 0.25, threshold: 60 };
    const DEFAULT_SIGNAL_WEIGHTS = Object.fromEntries(SIGNAL_DEFS.map(s => [s.key, s.weightInPillar]));

    /* intake form constants */
    const AUTHORITY_LEVELS = [
      { key: "none", th: "ไม่มี", idx: 10 },
      { key: "low",  th: "ต่ำ",   idx: 35 },
      { key: "med",  th: "ปานกลาง", idx: 60 },
      { key: "high", th: "สูง",   idx: 88 },
    ];
    const DECL_DEFAULT = { assetsM: 22, liabM: 5, prevNWM: 13, salaryMonthly: 70000, years: 16, concealM: 5, issues: 2, authority: "med" };
    const DECL_PRESETS = {
      high: { assetsM: 65, liabM: 3,  prevNWM: 20,  salaryMonthly: 65000, years: 13, concealM: 28,  issues: 5, authority: "high" },
      mid:  DECL_DEFAULT,
      low:  { assetsM: 8,  liabM: 4,  prevNWM: 3.8, salaryMonthly: 90000, years: 22, concealM: 0.6, issues: 0, authority: "none" },
    };

    function deriveASignals(d) {
      const assets = (d.assetsM || 0) * 1e6, liab = (d.liabM || 0) * 1e6;
      const prevNW = (d.prevNWM || 0) * 1e6, nw = assets - liab;
      const annualIncome = (d.salaryMonthly || 0) * 12;
      const concealable = (d.concealM || 0) * 1e6;
      const ratio = annualIncome * (d.years || 0) > 0 ? assets / (annualIncome * d.years) : 0;
      const jump  = prevNW > 0 ? ((nw - prevNW) / prevNW) * 100 : 0;
      const share = assets > 0 ? (concealable / assets) * 100 : 0;
      const opp = (AUTHORITY_LEVELS.find(a => a.key === d.authority) || AUTHORITY_LEVELS[0]).idx;
      return {
        asset_income_ratio: Math.max(0, ratio),
        networth_jump: Math.max(0, jump),
        concealable_share: Math.min(100, Math.max(0, share)),
        declaration_inconsistency: Math.max(0, d.issues || 0),
        position_opportunity: opp,
      };
    }

    function TierChip({ tier, small }) {
      const t = TIER[tier];
      return (
        <span className={`inline-flex items-center gap-1.5 rounded-sm font-semibold
          ${small ? "px-2 py-0.5 text-xs" : "px-2.5 py-1 text-sm"}
          ${t.soft} ${t.text} ring-1 ${t.ring}`}>
          <span className={`inline-block h-2 w-2 rounded-full ${t.dot}`} />
          {t.th}
        </span>
      );
    }

    function Bar({ value, colorClass, height = "h-2" }) {
      return (
        <div className={`w-full ${height} rounded-sm bg-slate-100 overflow-hidden`}>
          <div className={`${height} ${colorClass} rounded-sm`} style={{ width: `${Math.min(100, Math.round((value || 0) * 100))}%` }} />
        </div>
      );
    }

    /* --- Banner --- */
    function Banner() {
      return (
        <div className="sticky top-0 z-30 bg-amber-100 border-b border-amber-300 text-amber-900">
          <div className="mx-auto max-w-[1500px] px-4 py-1.5 flex items-center justify-center gap-2 text-center text-xs sm:text-sm font-semibold">

        const setStatus = pillar === "B" ? setBStatus : setCStatus;

          setRawP(simulateApiFetch(pillar, derivedA));

        onAdd({ id, nameTh: nameTh.trim() || `ผู้ยื่นบัญชี (จำลอง) ${nextIndex}`, positionTh, grade: parseInt(grade, 10), cohort, added: true }, assembledRaw);

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">

              <section>
                <h3 className="text-sm font-bold text-slate-800 mb-1">เกณฑ์เสนอตรวจสอบ <span className="font-normal text-slate-400">(Escalation threshold)</span></h3>
                <p className="text-xs text-slate-400 mb-3">เคสที่คะแนนถึงเกณฑ์นี้จะถูกเสนอให้ตรวจสอบยืนยัน</p>
                <div className="flex items-baseline justify-between mb-1">
                  <label className="text-sm font-semibold text-slate-700">คะแนนตั้งแต่</label>
                  <span className="tabular-nums text-sm font-bold text-slate-900">{threshold}</span>
                </div>
                <input type="range" min="0" max="100" step="1" value={threshold}
                  onChange={e => setThreshold(parseInt(e.target.value, 10))}
                  className="w-full accent-gov cursor-pointer" />
                <p className="mt-2 text-xs text-slate-400">ค่าเริ่มต้น 60</p>
              </section>
              <button onClick={resetAll} className="w-full rounded-md border border-slate-300 bg-white py-2 text-sm font-semibold text-slate-600 hover:bg-slate-50">
                คืนค่าเริ่มต้น (Reset defaults)
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* --- Root App --- */
    function App() {
      const base = useMemo(() => generateData(), []);
      const [weights, setWeights] = useState({ wA: DEFAULTS.wA, wB: DEFAULTS.wB, wC: DEFAULTS.wC });
      const [threshold, setThreshold] = useState(DEFAULTS.threshold);
      const [selectedId, setSelectedId] = useState(null);
      const [extra, setExtra] = useState({ officials: [], rawMatrix: {} });
      const [formOpen, setFormOpen] = useState(false);
      const [settingsOpen, setSettingsOpen] = useState(false);
      const [signalWeights, setSignalWeights] = useState(DEFAULT_SIGNAL_WEIGHTS);

      const setSignalWeight = useCallback((key, value) => {
        setSignalWeights(prev => {
          const pillar = SIGNAL_DEFS.find(s => s.key === key).pillar;
          const siblings = SIGNAL_DEFS.filter(s => s.pillar === pillar && s.key !== key).map(s => s.key);
          const remain = 1 - value;
          const sSum = siblings.reduce((a, k) => a + prev[k], 0);
          const next = { ...prev, [key]: value };
          if (sSum <= 1e-6) siblings.forEach(k => { next[k] = remain / siblings.length; });
          else siblings.forEach(k => { next[k] = remain * (prev[k] / sSum); });
          return next;
        });
      }, []);

      const scorePreview = useCallback((official, rawRow) => {
        const officials = base.officials.concat([official]);
        const rawMatrix = { ...base.rawMatrix, [official.id]: rawRow };
        const norm = normalizeMatrix(officials, rawMatrix);
        return scoreOfficial(official, norm[official.id], rawMatrix[official.id], weights, signalWeights);
      }, [base, weights, signalWeights]);

      const data = useMemo(() => {
        const officials = base.officials.concat(extra.officials);
        const rawMatrix = { ...base.rawMatrix, ...extra.rawMatrix };
        return { officials, rawMatrix, normMatrix: normalizeMatrix(officials, rawMatrix) };
      }, [base, extra]);

      const addCase = useCallback((official, rawRow) => {
        setExtra(prev => ({ officials: [...prev.officials, official], rawMatrix: { ...prev.rawMatrix, [official.id]: rawRow } }));
        setFormOpen(false);
        setSelectedId(official.id);
      }, []);

      const clearExtras = useCallback(() => { setExtra({ officials: [], rawMatrix: {} }); setSelectedId(null); }, []);

      const setWeight = useCallback((key, value) => {
        setWeights(prev => {
          const others = ["wA", "wB", "wC"].filter(k => k !== key);
          const remain = 1 - value;
          const oSum = others.reduce((a, k) => a + prev[k], 0);
          const next = { ...prev, [key]: value };
          if (oSum <= 1e-6) others.forEach(k => { next[k] = remain / 2; });
          else others.forEach(k => { next[k] = remain * (prev[k] / oSum); });
          return next;
        });
      }, []);

      const resetAll = useCallback(() => {
        setWeights({ wA: DEFAULTS.wA, wB: DEFAULTS.wB, wC: DEFAULTS.wC });
        setThreshold(DEFAULTS.threshold);
        setSignalWeights(DEFAULT_SIGNAL_WEIGHTS);
      }, []);

      const results = useMemo(
        () => computeQueue(data.officials, data.rawMatrix, data.normMatrix, weights, threshold, signalWeights),
        [data, weights, threshold, signalWeights]
      );
      const escalateCount = results.filter(r => r.escalate).length;
      const tierCounts = results.reduce((a, r) => (a[r.tier]++, a), { RED: 0, AMBER: 0, GREEN: 0 });
      const selected = results.find(r => r.official.id === selectedId) || null;

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900">
          <Banner />
          <Header onOpenSettings={() => setSettingsOpen(true)} />

          <div className="border-b border-slate-200 bg-white">
            <div className="mx-auto max-w-[1500px] px-5 py-2.5 flex flex-wrap items-center gap-x-6 gap-y-1 text-sm">
              <span className="text-slate-500">สรุประดับความเสี่ยง ({data.officials.length} ราย):</span>
              {[["RED", tierCounts.RED], ["AMBER", tierCounts.AMBER], ["GREEN", tierCounts.GREEN]].map(([tier, n]) => (
                <span key={tier} className="inline-flex items-center gap-1.5">
                  <span className={`inline-block h-2.5 w-2.5 rounded-full ${TIER[tier].dot}`}></span>
                  <span className={`font-bold tabular-nums ${TIER[tier].text}`}>{n}</span>
                  <span className="text-slate-500">{TIER[tier].th}</span>
                </span>
              ))}
              <span className="ml-auto text-slate-400 text-xs">เกณฑ์ระดับ: แดง ≥ 70 · เหลือง 40–69 · เขียว &lt; 40</span>
            </div>
          </div>

          <main className="mx-auto max-w-[1500px] px-5 py-5">
            <SopToolbar
              escalateCount={escalateCount} total={data.officials.length} threshold={threshold}
              onAddCase={() => setFormOpen(true)}
              extraCount={extra.officials.length}
              onClearExtras={clearExtras}
            />
            <QueueTable results={results} selectedId={selectedId} onSelect={setSelectedId} threshold={threshold} />
          </main>

          <footer className="mx-auto max-w-[1500px] px-5 pb-8 pt-2 text-xs text-slate-400 leading-relaxed">
            ABC Score · แบบจำลองตัวชี้วัดถ่วงน้ำหนักแบบโปร่งใส — ไม่ใช่การเรียนรู้ของเครื่อง · ทุกผลลัพธ์เป็นข้อเสนอต่อมนุษย์ผู้ตัดสิน
            <br/>ข้อมูลจำลองทั้งหมด ไม่เกี่ยวข้องกับบุคคลหรือหน่วยงานจริง · ไม่มีฐานข้อมูล ไม่มีการเชื่อมต่อเครือข่าย ไม่มีการจัดเก็บข้อมูล
          </footer>

          {selected && <DrillDown result={selected} weights={weights} threshold={threshold} onClose={() => setSelectedId(null)} />}
          {formOpen && <AddCaseForm nextIndex={extra.officials.length + 1} onAdd={addCase} onClose={() => setFormOpen(false)} scorePreview={scorePreview} />}
          <SettingsDrawer open={settingsOpen} weights={weights} setWeight={setWeight}
            threshold={threshold} setThreshold={setThreshold} resetAll={resetAll}
            signalWeights={signalWeights} setSignalWeight={setSignalWeight}
            onClose={() => setSettingsOpen(false)} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
